set -g mouse on
set -g set-clipboard on
set -g allow-passthrough on
set -g mode-keys vi
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Quick window switching — Option-Left/Right (no prefix)
bind-key -n M-Left previous-window
bind-key -n M-Right next-window

# Move current window left/right — Option-Shift-Left/Right (no prefix)
bind-key -n M-S-Left swap-window -t -1\; select-window -t -1
bind-key -n M-S-Right swap-window -t +1\; select-window -t +1
